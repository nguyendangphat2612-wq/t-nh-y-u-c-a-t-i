<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tình yêu của anh 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: linear-gradient(270deg, #ffd6e0, #ffe9c9, #ffc2d1);
  background-size: 600% 600%;
  animation: bg 10s infinite;
}

@keyframes bg {
  0% {background-position:0%}
  50% {background-position:100%}
  100% {background-position:0%}
}

.container {
  text-align: center;
  background: white;
  padding: 40px;
  border-radius: 25px;
  width: 90%;
  max-width: 500px;
  margin: auto;
  margin-top: 10vh;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

h2 {
  color: #ff4d6d;
}

img {
  width: 220px;
  border-radius: 20px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  50% {transform: translateY(-10px);}
}

.buttons {
  height: 150px;
  position: relative;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  position: absolute;
  cursor: pointer;
}

.yes {
  background: #4CAF50;
  left: 20%;
}

.no {
  background: #ff4d4d;
  left: 60%;
}

/* love screen */
#loveScreen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  flex-direction: column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle, #ff9a9e, #fecfef);
  z-index:999;
}

.bigHeart {
  font-size: 150px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  50% {transform: scale(1.3);}
}

.loveText {
  font-size: 30px;
  color: #ff1a4d;
  margin-top: 20px;
}

.timer {
  margin-top: 10px;
  font-size: 20px;
  color: #333;
}

.heart {
  position: absolute;
  font-size: 20px;
  animation: fly 3s linear forwards;
}

@keyframes fly {
  to {
    transform: translateY(-400px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>Em có yêu anh Phát không 💖</h2>
  <img src="11.jpg">

  <div class="buttons" id="area">
    <button class="yes" onclick="sayYes()">Có 💖</button>
    <button class="no" id="noBtn">Không 😏</button>
  </div>
</div>

<div id="loveScreen">
  <div class="bigHeart">💖</div>
  <div class="loveText">Anh biết mà 😏💖</div>
  <div class="timer" id="timer"></div>
</div>

<audio id="music" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>
const noBtn = document.getElementById("noBtn");
const area = document.getElementById("area");

/* 😈 né chuột nâng cấp */
document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();
  const dx = e.clientX - (rect.left + rect.width/2);
  const dy = e.clientY - (rect.top + rect.height/2);
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 150) move();
});

function move(){
  const x = Math.random()*(area.clientWidth - noBtn.offsetWidth);
  const y = Math.random()*(area.clientHeight - noBtn.offsetHeight);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

/* 💖 YES */
function sayYes(){
  document.getElementById("loveScreen").style.display = "flex";
  document.getElementById("music").play();

  setInterval(()=>{
    createHeart();
  },200);

  startTimer();
}

/* ❤️ hiệu ứng tim */
function createHeart(){
  const el = document.createElement("div");
  el.className = "heart";
  el.innerHTML = "💖";
  el.style.left = Math.random()*window.innerWidth+"px";
  el.style.bottom = "0px";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

/* ⏱️ đếm thời gian yêu */
function startTimer(){
  let sec = 0;
  setInterval(()=>{
    sec++;
    document.getElementById("timer").innerText =
      "Yêu nhau được: " + sec + " giây 💖";
  },1000);
}
</script>

</body>
</html>
